<h2>Registration Form</h2>

<form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">

  <!-- Username -->
  <div>
    <label>Username:</label>
    <input type="text" formControlName="username" />

    <div
      *ngIf="
        registrationForm.get('username')?.touched &&
        registrationForm.get('username')?.invalid
      "
    >
      <small
        *ngIf="
          registrationForm.get('username')?.errors?.['required']
        "
      >
        Username is required
      </small>

      <small
        *ngIf="
          registrationForm.get('username')?.errors?.['minlength']
        "
      >
        Username must be at least 3 characters
      </small>
    </div>
  </div>

  <br />

  <!-- Password -->
  <div>
    <label>Password:</label>
    <input type="password" formControlName="password" />

    <div
      *ngIf="
        registrationForm.get('password')?.touched &&
        registrationForm.get('password')?.invalid
      "
    >
      <small
        *ngIf="
          registrationForm.get('password')?.errors?.['required']
        "
      >
        Password is required
      </small>

      <small
        *ngIf="
          registrationForm.get('password')?.errors?.['minlength']
        "
      >
        Password must be at least 6 characters
      </small>
    </div>
  </div>

  <br />

  <!-- Confirm Password -->
  <div>
    <label>Confirm Password:</label>
    <input type="password" formControlName="confirmPassword" />

    <div
      *ngIf="
        registrationForm.get('confirmPassword')?.touched &&
        registrationForm.get('confirmPassword')?.invalid
      "
    >
      <small
        *ngIf="
          registrationForm.get('confirmPassword')?.errors?.['required']
        "
      >
        Confirm Password is required
      </small>
    </div>
  </div>

  <br />

  <button type="submit">
    Submit
  </button>

</form>
