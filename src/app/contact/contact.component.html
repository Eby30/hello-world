<h2>Contact Form</h2>

<form #contactForm="ngForm" (ngSubmit)="onSubmit()">

  <!-- Name -->

  <label>Name:</label>
  <input
    type="text"
    name="name"
    [(ngModel)]="user.name"
    required
    #name="ngModel"
  >

  <div *ngIf="name.invalid && name.touched">
    Name is required
  </div>

  <br><br>

  <!-- Email -->

  <label>Email:</label>
  <input
    type="email"
    name="email"
    [(ngModel)]="user.email"
    required
    email
    #email="ngModel"
  >

  <div *ngIf="email.invalid && email.touched">

    <div *ngIf="email.errors?.['required']">
      Email is required
    </div>

    <div *ngIf="email.errors?.['email']">
      Invalid email format
    </div>

  </div>

  <br><br>

  <!-- Submit Button -->

  <button type="submit" [disabled]="contactForm.invalid">
    Submit
  </button>

</form>
