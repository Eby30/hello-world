<h2>Welcome {{ studentName }}</h2>

<img [src]="profileImage" alt="Student Profile"
 width="120"
  height="120"
  style="border-radius: 50%; object-fit: cover;">

<br><br>

<button (click)="showMessage()">
  View Profile
</button>

<br><br>

<input type="text"
       [(ngModel)]="favoriteSubject"
       placeholder="Enter favorite subject">

<p>Your favorite subject is: {{ favoriteSubject }}</p>
